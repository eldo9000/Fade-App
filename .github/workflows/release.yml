name: Release

# Builds, signs, and publishes a Fade release for macOS (aarch64), Linux
# (x86_64), and Windows (x86_64).
#
# macOS distribution is unsigned (no Apple Developer ID). The .app is ad-hoc
# signed with `codesign --sign -` and has its quarantine xattr stripped before
# being packed. The updater bundle (Fade.app.tar.gz) is then re-signed with the
# Tauri minisign key so the embedded public key in tauri.conf.json verifies it.
#
# Linux (AppImage) and Windows (NSIS) updater bundles + sigs are produced
# directly by `tauri build` when TAURI_SIGNING_PRIVATE_KEY is set — no
# re-sign step is needed on those platforms.
#
# See docs/RELEASE.md for the full contract.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0). Must already exist or be created by this run.'
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: darwin-aarch64
            runner: macos-14
            target: aarch64-apple-darwin
          - platform: linux-x86_64
            runner: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - platform: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc

    defaults:
      run:
        # Git Bash ships on the Windows runner, so `bash` works on all three
        # platforms. Lets us keep a single shell dialect across `run:` blocks.
        shell: bash

    env:
      # Raw secrets — sanitized into TAURI_SIGNING_* below before use.
      _RAW_TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      _RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    outputs:
      version: ${{ steps.tag.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Decode signing key from armored secret
        # The secret TAURI_SIGNING_PRIVATE_KEY must be the *base64-armored*
        # keyfile — i.e. the output of `base64 -i ~/.tauri/fade.key | tr -d '\n'`.
        # The keyfile content is itself base64, so the secret is effectively
        # base64(base64(minisign_key)). Decoding once yields the 348-byte
        # keyfile content Tauri expects, regardless of whitespace/BOMs/invisible
        # characters that GitHub's secret UI may introduce (base64 tolerates
        # them). We write the decoded bytes to a file and hand Tauri the path.
        #
        # `base64 --decode` is the cross-platform spelling: GNU coreutils
        # (Linux, Windows Git Bash) and BSD base64 (macOS) both accept it,
        # whereas `-D` is BSD-only and `-d` is GNU-only.
        run: |
          set -euo pipefail
          if [ -z "${_RAW_TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not set."
            exit 1
          fi
          KEY_FILE="$RUNNER_TEMP/fade-signing.key"
          if ! printf '%s' "$_RAW_TAURI_SIGNING_PRIVATE_KEY" | base64 --decode > "$KEY_FILE" 2>/tmp/b64err; then
            echo "::error::Could not base64-decode TAURI_SIGNING_PRIVATE_KEY. The secret must be the output of: base64 -i ~/.tauri/fade.key | tr -d '\\n'"
            cat /tmp/b64err
            exit 1
          fi
          chmod 600 "$KEY_FILE"
          KEY_LEN=$(wc -c < "$KEY_FILE" | tr -d ' ')
          echo "decoded key length: $KEY_LEN bytes (expected 348)"
          if [ "$KEY_LEN" != "348" ]; then
            echo "::warning::decoded key is not 348 bytes — Tauri may still reject it."
          fi

          CLEAN_PW=$(printf '%s' "${_RAW_TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" | tr -d '\r\n')
          {
            echo "TAURI_SIGNING_PRIVATE_KEY=$KEY_FILE"
            echo "TAURI_SIGNING_PRIVATE_KEY_PASSWORD=$CLEAN_PW"
            echo "FADE_SIGNING_KEY_FILE=$KEY_FILE"
          } >> "$GITHUB_ENV"

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            echo "::error::could not determine tag"
            exit 1
          fi
          VERSION="${TAG#v}"
          # Strip semver pre-release suffix — Tauri names artifacts using
          # tauri.conf.json version (numeric base only, e.g. 0.7.0), not
          # the full tag version (e.g. 0.7.0-beta.1).
          VERSION_BASE="${VERSION%%-*}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_base=$VERSION_BASE" >> "$GITHUB_OUTPUT"
          echo "Resolved tag=$TAG version=$VERSION version_base=$VERSION_BASE"

      - name: Verify tag matches tauri.conf.json version
        run: |
          CONF_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          TAG_VERSION="${{ steps.tag.outputs.version }}"
          # Strip semver pre-release suffix (e.g. 0.7.0-beta.1 → 0.7.0) before
          # comparing to tauri.conf.json, which must stay at the numeric-only
          # base version so WiX/MSI bundling accepts it.
          TAG_VERSION_BASE="${TAG_VERSION%%-*}"
          echo "tauri.conf.json version: $CONF_VERSION"
          echo "tag version:             $TAG_VERSION"
          echo "tag base version:        $TAG_VERSION_BASE"
          if [ "$CONF_VERSION" != "$TAG_VERSION_BASE" ]; then
            echo "::error::tag base version ($TAG_VERSION_BASE) does not match src-tauri/tauri.conf.json version ($CONF_VERSION). Bump the config before tagging."
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux build deps
        if: matrix.platform == 'linux-x86_64'
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libssl-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            file

      - name: Configure git auth for private cargo deps
        # Fade depends on `librewin-common` from the private repo
        # eldo9000/Libre-Apps. CI's default GITHUB_TOKEN can only read the
        # current repo, so we rewrite https://github.com/ to include a PAT
        # with `Contents: Read` on Libre-Apps. Secret: LIBRE_APPS_TOKEN.
        env:
          LIBRE_APPS_TOKEN: ${{ secrets.LIBRE_APPS_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${LIBRE_APPS_TOKEN:-}" ]; then
            echo "::error::LIBRE_APPS_TOKEN secret is not set. Create a fine-grained PAT with Contents:Read on eldo9000/Libre-Apps and add it as a repo secret."
            exit 1
          fi

          # Probe the token against the API so a misconfigured PAT fails
          # here with a clear message rather than inside cargo.
          code=$(curl -sS -o /tmp/probe.json -w '%{http_code}' \
            -H "Authorization: Bearer ${LIBRE_APPS_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/eldo9000/Libre-Apps)
          if [ "$code" != "200" ]; then
            echo "::error::LIBRE_APPS_TOKEN cannot read eldo9000/Libre-Apps (HTTP $code)."
            echo "Fine-grained PAT requirements:"
            echo "  - Resource owner: eldo9000"
            echo "  - Repository access: eldo9000/Libre-Apps"
            echo "  - Permissions: Contents=Read AND Metadata=Read"
            cat /tmp/probe.json
            exit 1
          fi

          # `oauth2:TOKEN@github.com/` works for both classic and fine-grained PATs.
          git config --global \
            "url.https://oauth2:${LIBRE_APPS_TOKEN}@github.com/.insteadOf" \
            "https://github.com/"
          # Make cargo shell out to the git CLI so it honors url.insteadOf
          # (libgit2's built-in auth ignores the rewrite).
          echo "CARGO_NET_GIT_FETCH_WITH_CLI=true" >> "$GITHUB_ENV"

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Install npm deps
        run: npm ci

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}

      # ---- macOS-only: ad-hoc sign + repack + re-sign updater tarball ----

      - name: Locate macOS build output
        id: mac_artifacts
        if: matrix.platform == 'darwin-aarch64'
        run: |
          set -euo pipefail
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"
          APP_PATH="$BUNDLE_DIR/macos/Fade.app"
          TARBALL="$BUNDLE_DIR/macos/Fade.app.tar.gz"
          SIG="$BUNDLE_DIR/macos/Fade.app.tar.gz.sig"
          DMG=$(ls "$BUNDLE_DIR"/dmg/Fade_*_aarch64.dmg | head -n1)

          for f in "$APP_PATH" "$TARBALL" "$SIG" "$DMG"; do
            if [ ! -e "$f" ]; then
              echo "::error::missing expected artifact: $f"
              exit 1
            fi
          done

          echo "app_path=$APP_PATH"       >> "$GITHUB_OUTPUT"
          echo "tarball=$TARBALL"         >> "$GITHUB_OUTPUT"
          echo "sig=$SIG"                 >> "$GITHUB_OUTPUT"
          echo "dmg=$DMG"                 >> "$GITHUB_OUTPUT"
          echo "bundle_dir=$BUNDLE_DIR"   >> "$GITHUB_OUTPUT"

      - name: Ad-hoc codesign and strip quarantine
        if: matrix.platform == 'darwin-aarch64'
        run: |
          set -euo pipefail
          APP='${{ steps.mac_artifacts.outputs.app_path }}'
          xattr -cr "$APP"
          codesign --force --deep --sign - "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP" || true

      - name: Re-pack updater tarball from signed .app
        # `tauri build` produced a Fade.app.tar.gz that contains the pre-signed
        # .app. Overwrite it by re-tarring the now-signed .app so the tarball
        # users download matches the DMG contents. We then regenerate the .sig
        # below using the Tauri minisign key.
        if: matrix.platform == 'darwin-aarch64'
        run: |
          set -euo pipefail
          APP='${{ steps.mac_artifacts.outputs.app_path }}'
          TARBALL='${{ steps.mac_artifacts.outputs.tarball }}'
          APP_DIR=$(dirname "$APP")
          APP_NAME=$(basename "$APP")
          rm -f "$TARBALL"
          # -C into the containing dir so the tarball has `Fade.app/...` at its root
          tar -czf "$TARBALL" -C "$APP_DIR" "$APP_NAME"
          ls -la "$TARBALL"

      - name: Re-sign updater tarball with Tauri minisign key
        if: matrix.platform == 'darwin-aarch64'
        run: |
          set -euo pipefail
          TARBALL='${{ steps.mac_artifacts.outputs.tarball }}'
          SIG='${{ steps.mac_artifacts.outputs.sig }}'
          rm -f "$SIG"
          # The signer reads TAURI_SIGNING_PRIVATE_KEY implicitly as
          # --private-key, which clashes with our -f flag. Unset for this
          # invocation only.
          unset TAURI_SIGNING_PRIVATE_KEY
          npx --yes @tauri-apps/cli signer sign \
            -f "$FADE_SIGNING_KEY_FILE" \
            -p "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" \
            "$TARBALL"
          if [ ! -s "$SIG" ]; then
            echo "::error::signer did not produce $SIG"
            exit 1
          fi
          echo "re-signed tarball:"
          ls -la "$TARBALL" "$SIG"

      # ---- Collect per-platform artifacts into a staging dir ----

      - name: Stage artifacts for upload
        id: stage
        run: |
          set -euo pipefail
          STAGE="$RUNNER_TEMP/fade-stage"
          mkdir -p "$STAGE"
          # VERSION is the full tag version (e.g. 0.7.0-beta.1).
          # VERSION_BASE is the numeric-only base (e.g. 0.7.0) — Tauri uses
          # tauri.conf.json version for artifact filenames, so we need the base.
          VERSION='${{ steps.tag.outputs.version }}'
          V='${{ steps.tag.outputs.version_base }}'

          case "${{ matrix.platform }}" in
            darwin-aarch64)
              BUNDLE="src-tauri/target/aarch64-apple-darwin/release/bundle"
              cp "$BUNDLE"/dmg/Fade_${V}_aarch64.dmg "$STAGE/"
              cp "$BUNDLE"/macos/Fade.app.tar.gz      "$STAGE/"
              cp "$BUNDLE"/macos/Fade.app.tar.gz.sig  "$STAGE/"
              SIG_FILE="$STAGE/Fade.app.tar.gz.sig"
              ;;
            linux-x86_64)
              BUNDLE="src-tauri/target/x86_64-unknown-linux-gnu/release/bundle"
              # tauri v2 names Linux artifacts Fade_<ver>_amd64.* (capital F)
              # and the AppImage updater sig is .AppImage.sig (no .tar.gz wrapper).
              echo "--- linux bundle contents ---"
              find "$BUNDLE" -maxdepth 3 -type f | sort
              cp "$BUNDLE"/deb/Fade_${V}_amd64.deb               "$STAGE/"
              cp "$BUNDLE"/appimage/Fade_${V}_amd64.AppImage     "$STAGE/"
              cp "$BUNDLE"/appimage/Fade_${V}_amd64.AppImage.sig "$STAGE/"
              SIG_FILE="$STAGE/Fade_${V}_amd64.AppImage.sig"
              ;;
            windows-x86_64)
              BUNDLE="src-tauri/target/x86_64-pc-windows-msvc/release/bundle"
              # Tauri v2 produces an NSIS setup .exe with its updater .sig
              # directly (no .nsis.zip wrapper). Ship MSI + NSIS + NSIS sig.
              cp "$BUNDLE"/msi/Fade_${V}_x64_en-US.msi       "$STAGE/"
              cp "$BUNDLE"/nsis/Fade_${V}_x64-setup.exe      "$STAGE/"
              cp "$BUNDLE"/nsis/Fade_${V}_x64-setup.exe.sig  "$STAGE/"
              SIG_FILE="$STAGE/Fade_${V}_x64-setup.exe.sig"
              ;;
          esac

          echo "--- staged files ---"
          ls -la "$STAGE"
          echo "stage=$STAGE"        >> "$GITHUB_OUTPUT"
          echo "sig_file=$SIG_FILE"  >> "$GITHUB_OUTPUT"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fade-${{ matrix.platform }}
          path: ${{ steps.stage.outputs.stage }}/*
          if-no-files-found: error
          retention-days: 3

      - name: Upload signature (for finalize job)
        uses: actions/upload-artifact@v4
        with:
          name: fade-sig-${{ matrix.platform }}
          path: ${{ steps.stage.outputs.sig_file }}
          if-no-files-found: error
          retention-days: 3

  finalize:
    name: Assemble latest.json and publish release
    needs: build
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="$INPUT_TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          VERSION="${TAG#v}"
          VERSION_BASE="${VERSION%%-*}"
          echo "tag=$TAG"                   >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "version_base=$VERSION_BASE" >> "$GITHUB_OUTPUT"

      - name: Download all platform bundles
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: fade-*
          merge-multiple: false

      - name: Flatten release files
        id: files
        run: |
          set -euo pipefail
          RELEASE_DIR="$RUNNER_TEMP/fade-release"
          mkdir -p "$RELEASE_DIR"
          # Only the bundle artifact dirs (not the sig-only helper artifacts).
          for d in dist/fade-darwin-aarch64 dist/fade-linux-x86_64 dist/fade-windows-x86_64; do
            if [ -d "$d" ]; then
              cp -v "$d"/* "$RELEASE_DIR"/
            fi
          done
          echo "--- release files ---"
          ls -la "$RELEASE_DIR"
          echo "dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"

      - name: Generate latest.json
        id: manifest
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
          VERSION_BASE: ${{ steps.tag.outputs.version_base }}
        run: |
          set -euo pipefail
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          # Prefer the annotated tag body for release notes; fall back to a stub.
          NOTES=$(git tag -l --format='%(contents:body)' "$TAG" 2>/dev/null || true)
          if [ -z "$NOTES" ]; then
            NOTES="See GitHub release notes."
          fi

          # Artifact filenames use VERSION_BASE (tauri.conf.json version, e.g. 0.7.0)
          # because Tauri names bundles from the config, not the git tag.
          DARWIN_SIG_FILE="dist/fade-sig-darwin-aarch64/Fade.app.tar.gz.sig"
          LINUX_SIG_FILE="dist/fade-sig-linux-x86_64/Fade_${VERSION_BASE}_amd64.AppImage.sig"
          WINDOWS_SIG_FILE="dist/fade-sig-windows-x86_64/Fade_${VERSION_BASE}_x64-setup.exe.sig"

          for f in "$DARWIN_SIG_FILE" "$LINUX_SIG_FILE" "$WINDOWS_SIG_FILE"; do
            if [ ! -s "$f" ]; then
              echo "::error::missing signature file: $f"
              exit 1
            fi
          done

          export NOTES PUB_DATE DARWIN_SIG_FILE LINUX_SIG_FILE WINDOWS_SIG_FILE VERSION_BASE
          MANIFEST="latest.json"
          node - <<'NODE_EOF' > "$MANIFEST"
          const fs = require('fs');
          const base = 'https://github.com/eldo9000/Fade-App/releases/download/' + process.env.TAG + '/';
          // VERSION is the full tag version (e.g. 0.7.0-beta.1) for the manifest version field.
          // VERSION_BASE is used for artifact filenames (Tauri names them from tauri.conf.json).
          const v = process.env.VERSION;
          const vBase = process.env.VERSION_BASE;
          const manifest = {
            version: v,
            notes: process.env.NOTES,
            pub_date: process.env.PUB_DATE,
            platforms: {
              'darwin-aarch64': {
                signature: fs.readFileSync(process.env.DARWIN_SIG_FILE, 'utf8'),
                url: base + 'Fade.app.tar.gz',
              },
              'linux-x86_64': {
                signature: fs.readFileSync(process.env.LINUX_SIG_FILE, 'utf8'),
                url: base + 'Fade_' + vBase + '_amd64.AppImage',
              },
              'windows-x86_64': {
                signature: fs.readFileSync(process.env.WINDOWS_SIG_FILE, 'utf8'),
                url: base + 'Fade_' + vBase + '_x64-setup.exe',
              },
            },
          };
          process.stdout.write(JSON.stringify(manifest, null, 2) + '\n');
          NODE_EOF

          cp "$MANIFEST" "${{ steps.files.outputs.dir }}/$MANIFEST"
          echo "--- latest.json ---"
          cat "${{ steps.files.outputs.dir }}/$MANIFEST"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Fade ${{ steps.tag.outputs.tag }}
          draft: false
          prerelease: ${{ contains(steps.tag.outputs.version, '-') }}
          fail_on_unmatched_files: true
          files: |
            ${{ steps.files.outputs.dir }}/*
          body: |
            ## Fade ${{ steps.tag.outputs.tag }}

            Builds for macOS (Apple Silicon), Linux (x86_64), and Windows (x86_64).
            Distribution is unsigned on macOS (ad-hoc codesign only).

            **macOS:** open the DMG and drag `Fade.app` to `/Applications`.
            If Gatekeeper blocks launch, run:

            ```
            xattr -cr /Applications/Fade.app
            ```

            **Linux:** install the `.deb` (Debian/Ubuntu) or run the AppImage.
            Requires `ffmpeg` and `imagemagick` on the host.

            **Windows:** run the `.msi` installer.

            **Existing users:** the in-app updater will pick this release up
            automatically within a few seconds of next launch.
