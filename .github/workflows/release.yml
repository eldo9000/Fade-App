name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos
            bundles: dmg
            artifact: src-tauri/target/release/bundle/dmg/*.dmg

          - os: windows-latest
            name: windows
            bundles: nsis
            artifact: src-tauri/target/release/bundle/nsis/*-setup.exe

          - os: ubuntu-22.04
            name: linux
            bundles: deb,appimage
            artifact: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libsoup-3.0-dev patchelf

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Configure git for private deps
        run: git config --global url."https://x-access-token:${{ secrets.CARGO_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install npm deps
        run: npm install

      - name: Build Tauri app
        run: npm run tauri build -- --bundles ${{ matrix.bundles }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fade-${{ matrix.name }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Fade ${{ github.ref_name }}
          draft: true
          files: artifacts/**/*
          body: |
            ## Fade ${{ github.ref_name }}

            ### Download

            | Platform | File |
            |----------|------|
            | macOS | `.dmg` |
            | Windows | `-setup.exe` |
            | Linux | `.deb` · `.AppImage` |

            **macOS:** If Gatekeeper blocks launch, right-click → Open, or run:
            ```
            xattr -cr /Applications/Fade.app
            ```
            **Windows:** If SmartScreen warns, click "More info" → "Run anyway."
            **Linux (AppImage):** `chmod +x Fade_*.AppImage && ./Fade_*.AppImage`
