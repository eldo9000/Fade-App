name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev libsoup-3.0-dev

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          components: clippy, rustfmt

      - uses: actions/setup-node@v4
        with:
          node-version: 22


      - name: Configure git for private deps
        run: git config --global url."https://x-access-token:${{ secrets.CARGO_DEPS_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install npm deps
        run: npm install

      - name: Build frontend
        run: npm run build

      - name: Clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Cargo check
        working-directory: src-tauri
        run: cargo check --all-targets
